# Session Configuration
# Produced by the Plan action and consumed by the Ideate action.
# Continue mode reads the parent's config and creates a modified copy.

concept_seed: "[description or file ref]"
concept_slug: "[slug]"

# Lineage (populated for continuations, null for new sessions)
parent_session: null
parent_version: null
continuation_focus: null
branch_point: null

depth:
  level: "standard"          # quick | standard | deep | exhaustive
  min_reports: null          # null = use level default
  max_reports: null          # null = use level default
  interesting_threshold: null

research:
  mode: "on-demand"          # none | on-demand | parallel | pre-session
  topics: []
